<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Responsive Image Gallery</h1>
    <p>CodeAlpha Frontend Development Internship - Task 1</p>
</header>

<div class="filter-buttons">
    <button class="active" onclick="filterImages('all')">All</button>
    <button onclick="filterImages('nature')">Nature</button>
    <button onclick="filterImages('cars')">Cars</button>
</div>

<div class="gallery">

    <div class="image nature">
        <img src="images/img1.jpg" alt="Nature">
    </div>

    <div class="image nature">
        <img src="images/img2.jpg" alt="Nature">
    </div>

    <div class="image nature">
        <img src="images/img3.jpg" alt="Nature">
    </div>

    <div class="image cars">
        <img src="images/img4.jpg" alt="Car">
    </div>

    <div class="image cars">
        <img src="images/img5.jpg" alt="Car">
    </div>

    <div class="image cars">
        <img src="images/img6.jpg" alt="Car">
    </div>

</div>

<!-- Lightbox -->

<div id="lightbox">
    <span id="close">&times;</span>

    <button id="prev">&#10094;</button>

    <img id="lightbox-img" src="" alt="">

    <button id="next">&#10095;</button>
</div>

<script src="script.js"></script>

</body>

</html>
